vich_uploader:
    db_driver: orm

    mappings:
        products:
            uri_prefix: /asset/images/property
            upload_destination: '%kernel.project_dir%/public/asset/images/property'
            namer: Vich\UploaderBundle\Naming\SmartUniqueNamer
            inject_on_load: false
            delete_on_remove: true
            delete_on_update: true
            
